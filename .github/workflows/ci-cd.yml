name: CUST Cloud Platform CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Lint & Unit Tests ───────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [registration, lms, examination, api-gateway]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install flake8 pytest requests
          pip install -r services/${{ matrix.service }}/requirements.txt

      - name: Lint with flake8
        run: |
          flake8 services/${{ matrix.service }}/app.py \
            --max-line-length=120 \
            --ignore=E501,W503

      - name: Syntax check
        run: python -m py_compile services/${{ matrix.service }}/app.py

  # ── Build Docker Images ─────────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Registration image
        run: docker build -t cust/registration:${{ github.sha }} ./services/registration

      - name: Build LMS image
        run: docker build -t cust/lms:${{ github.sha }} ./services/lms

      - name: Build Examination image
        run: docker build -t cust/examination:${{ github.sha }} ./services/examination

      - name: Build API Gateway image
        run: docker build -t cust/api-gateway:${{ github.sha }} ./services/api-gateway

  # ── Integration Tests ───────────────────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start services
        run: |
          docker-compose up -d
          echo "Waiting for services to be healthy..."
          sleep 30

      - name: Check service health
        run: |
          curl -f http://localhost:5000/health || exit 1
          curl -f http://localhost:5001/health || exit 1
          curl -f http://localhost:5002/health || exit 1
          curl -f http://localhost:5003/health || exit 1

      - name: Run integration tests
        run: |
          pip install requests
          python tests/test_and_benchmark.py

      - name: Stop services
        if: always()
        run: docker-compose down -v
