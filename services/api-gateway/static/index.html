<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CUST Cloud Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; color: white; }
    .card { transition: all 0.3s; background: rgba(255,255,255,0.1); }
    .card:hover { transform: translateY(-8px); }
    pre { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 8px; max-height: 500px; overflow: auto; }
  </style>
</head>
<body>
  <div class="container py-5">
    <h1 class="text-center mb-4"><i class="fas fa-university"></i> CUST Cloud Portal</h1>
    
    <div id="health" class="alert text-center mb-4"></div>

    <div class="row mb-4">
      <div class="col-md-4">
        <div class="card h-100 text-white">
          <div class="card-body">
            <h5>Registration</h5>
            <button class="btn btn-success w-100 mb-2" onclick="loadStudents()">📋 View Students</button>
            <button class="btn btn-outline-light w-100" onclick="addStudent()">➕ Add New Student</button>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card h-100 text-white">
          <div class="card-body">
            <h5>LMS</h5>
            <button class="btn btn-primary w-100" onclick="loadMaterials()">📚 Course Materials</button>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card h-100 text-white">
          <div class="card-body">
            <h5>Examination</h5>
            <button class="btn btn-warning w-100" onclick="loadTranscript()">📄 View Transcript</button>
          </div>
        </div>
      </div>
    </div>

    <div id="content" class="mt-4"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    async function apiCall(url) {
      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return await res.json();
      } catch (e) {
        return { error: e.message };
      }
    }

    async function loadHealth() {
      const data = await apiCall('/health');
      const el = document.getElementById('health');
      if (data.overall === 'healthy') {
        el.className = 'alert alert-success';
        el.innerHTML = '✅ All Services Healthy';
      } else {
        el.className = 'alert alert-warning';
        el.innerHTML = '⚠️ Some services degraded';
      }
    }

    async function loadStudents() {
      const data = await apiCall('/api/registration/students');
      let html = '<h4>Registered Students</h4><div class="row">';
      (data || []).forEach(s => {
        html += `<div class="col-md-4 mb-2"><div class="card"><div class="card-body">${s.student_id} - ${s.name}</div></div></div>`;
      });
      html += '</div>';
      document.getElementById('content').innerHTML = html;
    }

    function addStudent() {
      const name = prompt("Student Name:");
      const sid = prompt("Student ID:");
      if (name && sid) {
        fetch('/api/registration/students', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({student_id: sid, name, email: "student@cust.edu.pk", program: "BCE", semester: 1})
        }).then(() => { alert("✅ Added!"); loadStudents(); });
      }
    }

    async function loadMaterials() {
      const data = await apiCall('/api/lms/materials/CPE4541');
      let html = '<h4>Course Materials - CPE4541</h4>';
      html += data.error ? `<div class="alert alert-danger">${data.error}</div>` : `<pre>${JSON.stringify(data, null, 2)}</pre>`;
      document.getElementById('content').innerHTML = html;
    }

    async function loadTranscript() {
      const data = await apiCall('/api/exam/transcript/FA21-BCE-001');
      let html = '<h4>Transcript - FA21-BCE-001</h4>';
      html += data.error ? `<div class="alert alert-danger">${data.error}</div>` : `<pre>${JSON.stringify(data, null, 2)}</pre>`;
      document.getElementById('content').innerHTML = html;
    }

    window.onload = loadHealth;
  </script>
</body>
</html>
